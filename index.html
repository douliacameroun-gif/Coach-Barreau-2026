<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">

    <!-- Open Graph Metadata for Facebook -->
    <meta property="og:title" content="Your Page Title">
    <meta property="og:description" content="A description of your page">
    <meta property="og:image" content="https://i.postimg.cc/G2LvBGPN/generated-image-(1).png">
    <meta property="og:url" content="https://example.com">

    <!-- Twitter Card Metadata -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Your Page Title">
    <meta name="twitter:description" content="A description of your page">
    <meta name="twitter:image" content="https://i.postimg.cc/G2LvBGPN/generated-image-(1).png">

    <title>Your Page Title</title>
</head>
<body>
    <h1>Hello, world!</h1>
</body>
</html>
